# Trinity S3AI — Claim Ledger (SSOT)
#
# Single source of truth for the project's public-facing claims.
#
# Generated artefacts:
#   - README.md table (between CLAIMS_TABLE markers)
#   - games/trinity_fold/fixtures/generated_claim_cards.json (GOLDEN CHAIN)
#
# Status vocabulary is canonical and matches docs/CLAIM_STATUS.md §1 and the
# Rust `ClaimStatus` enum at games/trinity_fold/crates/ring0_core/src/claim.rs:
#
#   - verified                : Coq Qed / Lean proof; statement is mathematical
#   - empirical_fit           : numeric agreement, not derived
#   - open_conjecture         : stated but not proven
#   - high_risk_or_falsified  : refuted, or far from data
#   - retracted_or_unverified : default / withdrawn; should not stay here
#
# Fields:
#   id            — stable kebab-case id, unique
#   title         — full sentence for README table
#   short_label   — short label for game card
#   layer         — L0..L7 from the tech tree
#   status        — one of the five values above
#   evidence      — file / theorem / artifact that backs the status
#   owner_file    — primary canonical owner doc / source file
#   blocking_gap  — what would have to happen to upgrade the status (free text;
#                   empty string if no upgrade is intended, e.g. for refutations)
#   game_card     — metadata for the GOLDEN CHAIN puzzle
#       kind        — constant | symmetry | geometry | field | constraint |
#                     observable | infra | meta
#       description — one-paragraph description shown on the card
#       tags        — list of free-text tags (e.g. [no_go], [compression])
#
# Editing rules:
#   1. After editing this file, run `python3 scripts/generate_claims.py` to
#      regenerate README and game card data. CI runs the same script with
#      `--check` and fails if the generated artefacts are stale.
#   2. Do not promote a status without updating `evidence` and removing the
#      corresponding `blocking_gap`. Promotion from empirical_fit to verified
#      requires a real Coq/Lean derivation of the *physical* statement, not
#      just a bound check (see docs/CLAIM_STATUS.md §2).
#   3. Public docs are English-only. Do not add Cyrillic to titles or
#      descriptions.

