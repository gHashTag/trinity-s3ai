[package]
name = "TrinityLean"
version = "0.2.0"

[[require]]
name = "Mathlib"
from = "git"
url = "https://github.com/leanprover-community/mathlib4"
rev = "v4.13.0"

[[lean_lib]]
name = "TrinityLean"
# All source files under TrinityLean/ are included automatically by Lake
# when `globs` is omitted — Lake discovers them via the module root.
# Explicit roots for clarity:
#   TrinityLean.CorePhi            (Stage 0 — 14 lemmas)
#   TrinityLean.KODimension        (Stage 1 — 18 lemmas)
#   TrinityLean.QuaternionicLinearity (Stage 1 — 18 lemmas)
