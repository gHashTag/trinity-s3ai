name: Rust CI

on:
  push:
    branches: [main, master, dev]
    paths:
      - 'trinity_rust/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'trinity_rust/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Format, Clippy & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trinity_rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('trinity_rust/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('trinity_rust/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: trinity_rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('trinity_rust/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features

      - name: cargo build --release
        run: cargo build --release
