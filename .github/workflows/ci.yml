name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Job 1: Anti-Numerology Gate (runs FIRST, blocks everything else) ──────
  anti_numerology_check:
    runs-on: ubuntu-latest
    name: Anti-Numerology Gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run anti-numerology gate
        # Pass the commit message via env, not shell interpolation, so multiline
        # bodies (e.g. merge commits) don't break the shell with stray `-`/`*` lines.
        # The gate honours [skip-numerology-check] when present in GIT_COMMIT_MSG.
        env:
          GIT_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: python3 scripts/anti_numerology_gate.py
        # Hard gate: exit 1 if any multi-atom formula lacks an honesty tag.
        # Per-commit override: add [skip-numerology-check] to your commit message.
        # Repo-wide override: set SKIP_NUMEROLOGY_CHECK=1 (not recommended).
        continue-on-error: false

      - name: Gate summary (always shown)
        if: always()
        run: |
          echo "=== ANTI-NUMEROLOGY GATE SUMMARY ==="
          python3 scripts/anti_numerology_gate.py 2>/dev/null | grep -E 'PASS|FLAG|WHITELIST|VERDICT' || true

      - name: Install claim ledger deps
        run: pip install pyyaml

      - name: Validate claim ledger SSOT (docs/claims.yaml)
        # Fails if YAML is malformed, a status/layer/kind is invalid, or the
        # README table / generated GOLDEN CHAIN card JSON is stale.
        run: python3 scripts/generate_claims.py --check

  # ── Job 1b: Markdown link audit (fast, no network) ────────────────────────
  markdown_links:
    runs-on: ubuntu-latest
    name: Markdown link audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check internal markdown links (no external HTTP)
        run: python3 scripts/check_markdown_links.py --check --all

  # ── Job 1c: Commit signature check (fast, read-only) ─────────────────────
  signature_check:
    runs-on: ubuntu-latest
    name: Commit signature check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to verify signatures
      - name: Check all commits in PR are signed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            python3 scripts/check_commit_signatures.py "${BASE_SHA}..${HEAD_SHA}"
          else
            echo "Not a PR event (push to main?) — checking last 20 commits"
            python3 scripts/check_commit_signatures.py HEAD~20..HEAD
          fi

  # ── Job 2: Coq proof build + Python validators ────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: anti_numerology_check   # only runs if gate passes

    steps:
      - uses: actions/checkout@v4

      - name: Build Coq proofs (docker-coq-action, Coq 8.20.1)
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '8.20.1'
          ocaml_version: 'default'
          before_install: |
            startGroup "Fix workspace permissions for coq user"
              sudo chmod -R a+w /github/workspace
            endGroup
            startGroup "Print opam config"
              opam config list; opam repo list; opam list
            endGroup
          install: |
            startGroup "Install coq-interval and coq-coquelicot"
              sudo apt-get update -y -q
              opam repo add coq-released https://coq.inria.fr/opam/released || true
              opam update -y
              opam install -y -j 2 coq-interval coq-coquelicot
            endGroup
          script: |
            startGroup "Compile Coq proofs"
              cd proofs/trinity
              coq_makefile -f _CoqProject -o Makefile.coq
              make -f Makefile.coq -j$(nproc)
            endGroup
          uninstall: |
            startGroup "Build summary"
              echo "Coq build complete"
            endGroup

      - name: Fix proof directory permissions
        run: sudo chown -R $USER:$USER proofs/trinity/ || true

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install mpmath numpy

      - name: Run validate_v4.py (canonical formula validator, gates build)
        run: python3 scripts/validators/validate_v4.py

      - name: Run test_comprehensive.py (diagnostic, historical failures)
        continue-on-error: true
        run: python3 scripts/validators/test_comprehensive.py

      - name: Run honest_pvalue_final.py (diagnostic, hardcoded path)
        continue-on-error: true
        run: python3 scripts/validators/honest_pvalue_final.py

      - name: Upload Coq artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coq-compiled
          path: proofs/trinity/*.vo

      - name: Report status
        run: |
          echo "=== BUILD STATUS ==="
          grep -c 'Qed' proofs/trinity/*.v | awk -F: '{sum+=$2} END {print "Total QED theorems: " sum}'
          grep -c 'Admitted' proofs/trinity/*.v | awk -F: '{sum+=$2} END {print "Total Admitted: " sum}'
          echo "=== Trinity S3AI v4.12 ==="
          echo "Status: active boundary-mapping research program — see RESEARCH_STATUS.md and BoundaryTheorems.v"
