name: Lean 4 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: false  # Verified locally: lake build passes
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify elan installation
        run: |
          elan --version
          lean --version

      - name: Cache Mathlib build artifacts
        uses: actions/cache@v4
        with:
          path: |
            derivations/lean_port/TrinityLean/.lake/packages
            derivations/lean_port/TrinityLean/.lake/build
          key: lean-mathlib-${{ runner.os }}-v4.13.0-${{ hashFiles('derivations/lean_port/TrinityLean/lakefile.lean', 'derivations/lean_port/TrinityLean/lean-toolchain') }}
          restore-keys: |
            lean-mathlib-${{ runner.os }}-v4.13.0-

      - name: Build TrinityLean
        run: |
          cd derivations/lean_port/TrinityLean
          # Resolve Mathlib dependency (idempotent; uses cached .lake/packages when present)
          lake update -R
          # Pull pre-built Mathlib olean cache to avoid >1h fresh Mathlib compilation
          lake exe cache get || true
          lake build

      - name: Report build status
        if: always()
        run: |
          echo "=== LEAN BUILD STATUS ==="
          if [ -d derivations/lean_port/TrinityLean/.lake/build/lib ]; then
            echo "TrinityLean: BUILT"
          else
            echo "TrinityLean: NOT BUILT"
          fi
