name: Lean 4 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: false  # Verified locally: lake build passes (pure Lean)
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Verify elan installation
        run: |
          elan --version
          lean --version

      # Cache .lake/packages for optional Mathlib builds.
      # Pure builds have no packages and this cache is a no-op.
      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: derivations/lean_port/TrinityLean/.lake/packages
          key: ${{ runner.os }}-lake-packages-${{ hashFiles('derivations/lean_port/TrinityLean/lean-toolchain') }}

      - name: Build TrinityLean
        run: |
          cd derivations/lean_port/TrinityLean
          lake build

      - name: Report build status
        if: always()
        run: |
          echo "=== LEAN BUILD STATUS ==="
          if [ -d derivations/lean_port/TrinityLean/.lake/build/lib ]; then
            echo "TrinityLean: BUILT"
          else
            echo "TrinityLean: NOT BUILT"
          fi
